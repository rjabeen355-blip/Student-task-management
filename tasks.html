<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Task Manager</title>
</head>
<body>
    <div class="container mt-5">
        <a href="index.html">← Back to Home</a>
        <h2 class="mt-3">Student Task Manager</h2>
        <div class="input-group mb-3">
            <input type="text" id="taskInput" class="form-control" placeholder="New Task Title">
            <button class="btn btn-success" onclick="addTask()">Add Task</button>
        </div>
        <ul id="taskList" class="list-group shadow-sm"></ul>
    </div>

    <script>
        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const data = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = data.map(t => `
                <li class="list-group-item d-flex justify-content-between">
                    ${t.title}
                    <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">Delete</button>
                </li>`).join('');
        }

        async function addTask() {
            const title = document.getElementById('taskInput').value;
            if(!title) return;
            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });
            document.getElementById('taskInput').value = '';
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
            loadTasks();
        }
        loadTasks();
    </script>
</body>
</html>
